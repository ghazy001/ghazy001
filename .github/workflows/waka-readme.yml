name: 🕒 Update WakaTime Stats

permissions:
  contents: write

on:
  schedule:
    - cron: "30 22 * * *"
  workflow_dispatch: {}

concurrency:
  group: waka-readme
  cancel-in-progress: true

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          SHOW_TITLE: false
          TIME_RANGE: last_7_days
          SHOW_TIME: true
          SHOW_TOTAL: true
          LANG_COUNT: 6
          SECTION_NAME: waka
          CODE_LANG: txt
          BLOCKS: "⣀⣄⣤⣦⣶⣷⣿"
          STOP_AT_OTHER: true
          IGNORED_LANGUAGES: Binary,YAML,TOML
          COMMIT_MESSAGE: "✨ refresh WakaTime stats"
